# Sample nginx site for serving the Vite bundle and proxying the Rust API.
# Replace events.example.com and paths with the deployed host and release paths.

upstream event_organization_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name events.example.com;

    root /var/www/event-organization/frontend;
    index index.html;

    client_max_body_size 12m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_pass http://event_organization_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
